- name: Free disk space
  run: |
    echo "Before cleanup:"
    df -h

    sudo rm -rf /usr/share/dotnet
    sudo rm -rf /usr/local/lib/android
    sudo rm -rf /opt/ghc
    sudo rm -rf /opt/hostedtoolcache/CodeQL
    sudo rm -rf /usr/local/.ghcup

    sudo apt-get clean
    docker system prune -af || true

    echo "After cleanup:"
    df -h

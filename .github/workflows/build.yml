name: Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 */16 * *'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Update vanadium
        run: |
          cd vanadium
          git fetch --tags
          git checkout $(git tag | sort -V | tail -n1)
          cd ..

          git add vanadium

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if ! git diff --cached --quiet; then
            git commit -m "Update vanadium"
            git push
          fi

      - name: Prepare Environment
        run: |
          chmod +x *.sh
          echo "unix_time=$(date +%s)" >> $GITHUB_ENV

      - name: Build
        env:
          DEBIAN_FRONTEND: noninteractive
          LOCAL_TEST_JKS: ${{ secrets.LOCAL_TEST_JKS }}
          STORE_TEST_JKS: ${{ secrets.STORE_TEST_JKS }}
        run: |
          ./build.sh

      - name: Rename Outputs
        run: |
          VERSION=$(find chromium/src/out/release -name '*arm64-v8a.apk' | sed 's/.*\///;s/-arm64-v8a.apk$//')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          mv $(find chromium/src/out/release -name '*arm64-v8a.aab') "${VERSION}-${{ env.unix_time }}-arm64-v8a.aab"
          mv $(find chromium/src/out/release -name '*arm64-v8a.apk') "${VERSION}-${{ env.unix_time }}-arm64-v8a.apk"
          mv $(find chromium/src/out/release -name '*armeabi-v7a.apk') "${VERSION}-${{ env.unix_time }}-armeabi-v7a.apk"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Panther
          path: |
            *.apk
            *.aab

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          files: |
            *.apk
            *.aab

      - name: Attest Build
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            *.apk
            *.aab
